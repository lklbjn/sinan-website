name: Build and Deploy Docker Image

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

env:
  DOCKER_IMAGE_NAME: registry.cn-hangzhou.aliyuncs.com/yixing-tech/sinan-website
  NODE_VERSION: 20

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    environment: ALIYUN

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9
          run_install: false

      - name: Get pnpm store directory
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build project
        run: pnpm run build

      - name: Verify dist directory
        run: |
          echo "Checking dist directory..."
          ls -la dist/
          if [ -d "dist" ]; then
            echo "✅ Dist directory created successfully"
            echo "📦 Dist directory size: $(du -sh dist/ | cut -f1)"
          else
            echo "❌ Dist directory not found!"
            exit 1
          fi

      - name: Extract version from package.json
        id: extract_version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Version: $VERSION"

      - name: Generate build info
        id: build_info
        run: |
          echo "build_date=$(date +'%Y-%m-%d %H:%M:%S')" >> $GITHUB_OUTPUT
          echo "commit_sha=${GITHUB_SHA:0:8}" >> $GITHUB_OUTPUT

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: sinan-website-dist-${{ steps.extract_version.outputs.version }}-${{ steps.build_info.outputs.commit_sha }}
          path: dist/
          retention-days: 30
          compression-level: 6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Aliyun Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: registry.cn-hangzhou.aliyuncs.com
          username: ${{ secrets.ALIYUN_USERNAME }}
          password: ${{ secrets.ALIYUN_PASSWORD }}

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.DOCKER_IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value=${{ steps.extract_version.outputs.version }}
            type=raw,value=${{ steps.extract_version.outputs.version }}-${{ steps.build_info.outputs.commit_sha }}

      - name: Build Docker image
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            SOFTWARE_VERSION=${{ steps.extract_version.outputs.version }}
            SOFTWARE_VERSION_DATE=${{ steps.build_info.outputs.build_date }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          outputs: type=docker,dest=/tmp/sinan-website-image.tar

      - name: Upload Docker image artifact
        uses: actions/upload-artifact@v4
        with:
          name: sinan-website-docker-${{ steps.extract_version.outputs.version }}-${{ steps.build_info.outputs.commit_sha }}
          path: /tmp/sinan-website-image.tar
          retention-days: 30
          compression-level: 6

      - name: Verify Docker image artifact
        run: |
          echo "📦 Docker image artifact information:"
          echo "File: /tmp/sinan-website-image.tar"
          echo "Size: $(du -h /tmp/sinan-website-image.tar | cut -f1)"
          echo "MD5: $(md5sum /tmp/sinan-website-image.tar | cut -d' ' -f1)"

      - name: Generate build summary
        run: |
          echo "## 🚀 Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 📋 Build Information" >> $GITHUB_STEP_SUMMARY
          echo "- **Version**: ${{ steps.extract_version.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit**: ${{ steps.build_info.outputs.commit_sha }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Build Date**: ${{ steps.build_info.outputs.build_date }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Branch**: ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 📦 Artifacts Generated" >> $GITHUB_STEP_SUMMARY
          echo "- **Dist Files**: \`sinan-website-dist-${{ steps.extract_version.outputs.version }}-${{ steps.build_info.outputs.commit_sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Docker Image**: \`sinan-website-docker-${{ steps.extract_version.outputs.version }}-${{ steps.build_info.outputs.commit_sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 🐳 Docker Images" >> $GITHUB_STEP_SUMMARY
          echo "- \`registry.cn-hangzhou.aliyuncs.com/yixing-tech/sinan-website:latest\`" >> $GITHUB_STEP_SUMMARY
          echo "- \`registry.cn-hangzhou.aliyuncs.com/yixing-tech/sinan-website:${{ steps.extract_version.outputs.version }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- \`registry.cn-hangzhou.aliyuncs.com/yixing-tech/sinan-website:${{ steps.extract_version.outputs.version }}-${{ steps.build_info.outputs.commit_sha }}\`" >> $GITHUB_STEP_SUMMARY

      - name: Image digest
        if: github.event_name != 'pull_request'
        run: echo "Image digest:${{ steps.build.outputs.digest }}"